defaults:
  - launcher: local
  - solver: cem
  - _self_

world:
  env_name: swm/PushT-v1    # placeholder — WAAM eval needs its own env wrapper
  num_envs: ${eval.num_eval}
  max_episode_steps: ???
  history_size: 1
  frame_skip: 1

dataset:
  stats: ${eval.dataset_name}
  keys_to_cache:
    - action
    - position_xy_mm

seed: 42
policy: random # ckpt name or random

plan_config:
  horizon: 5
  receding_horizon: 5
  action_block: 5

eval:
  num_eval: 50
  goal_offset_steps: 25
  eval_budget: 50
  img_size: 224
  dataset_name: ???
  callables: []

output:
  filename: waam_results.txt
