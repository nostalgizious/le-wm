defaults:
  - _self_
  - data: pusht

# Explicit keys allow struct-mode access to config-group content.
# When data=waam, data.dataset + data.render are placed under this key.
data: {}

output_model_name: lewm
subdir: ${hydra:job.id}

num_workers: 6
train_split: 0.9
seed: 3072
img_size: 128
patch_size: 16
encoder_scale: tiny
dump_object: True

trainer:
  max_epochs: 100
  devices: auto
  accelerator: gpu
  precision: bf16-mixed
  gradient_clip_val: 1.0

loader:
  batch_size: 32
  num_workers: ${num_workers}
  persistent_workers: True
  prefetch_factor: 3
  pin_memory: True

optimizer:
  type: AdamW
  lr: 5e-5
  weight_decay: 1e-3

scheduler:
  type: LinearWarmupCosineAnnealingLR
  warmup_steps: 100
  max_steps: 10000

wandb:
  enabled: True
  config:
    entity: fsandco
    project: lwm-waam
    name: ${output_model_name}
    id: ${subdir}
    resume: allow
    log_model: False

wm:
  type: lewm
  history_size: 3
  num_preds: 1
  embed_dim: 192

predictor:
  depth: 6
  heads: 16
  mlp_dim: 2048
  dim_head: 64
  dropout: 0.1
  emb_dropout: 0.0

loss:
  sigreg:
    weight: 0.2
    kwargs:
      knots: 17
      num_proj: 1024

probe:
  enabled: false  # default off; set true for validation runs
  mlp_fit:
    epochs: 20
    lr: 1e-3
    batch_size: 256
