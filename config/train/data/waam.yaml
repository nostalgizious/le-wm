# WAAM dataset config for LeWM training.
#
# Keys are nested under "data" (default package for config-group data/*.yaml).
# Render params: mirror of conf/training/default.yaml.
# Canonical source: conf/training/default.yaml — update both if defaults change.
#
# NOTE: do NOT include "goal" in keys_to_load — WAAM always provides it.
# NOTE: do NOT include "proprio" or "state" — WAAM uses "position_xy_mm".

dataset:
  type: waam
  path: ???                  # e.g. output/datagen/randlines_20260508_132331.h5
  frameskip: 4
  num_steps: ${eval:'${wm.num_preds} + ${wm.history_size}'}
  observation_source: auto    # render from slabs ("auto" | "raw" | "pixels")
  max_episodes: null          # limit to first N episodes; null = all
  keys_to_load:
    - pixels
    - action
    - position_xy_mm
    # Material and temperature raw slabs — required when probe.enabled = true
    # to compute peak_temp_k and pct_geometry probe targets.
    - material
    - temperature
    # NOTE: do NOT add "ir" or "depth" to keys_to_load.
    # They are computed columns (rendered on-the-fly from raw slabs) and
    # get_col_data() decompresses every sample to produce them — this is
    # extremely slow on large datasets (>10× slowdown).  The model uses
    # "pixels" (pre-cached render) for training, not raw ir/depth. 

render:
  projection_mode: 0
  mask_empty_space: true
  hot_threshold_k: 400.0
  blur_kernel_size: 0
  blur_sigma_px: 0.0
  noise_std_norm: 0.0
  normalize_depth: true
  return_absolute_height: false
  position_sigma_px: 5.0
  # Which geometry to use as the goal target.
  # "synthetic" → goal_geometry (from randlines)
  # "final"     → final_geometry (real final material, falls back to goal_geometry if missing)
  goal_source: synthetic
